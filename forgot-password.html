<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-ClanShop - Forgot-Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container-wrapper">
            <img src="resources/images/logo.png" class="uclan-logo" alt="uclan logo" style="width: 150px;" height="50px">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <div class="page-container">
        <div class="login-container">
            <form class="login-form">
                <h2>Reset Password</h2>
                <p>Enter your email below to receive a password reset code</p>

                <div class="input-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" name="reset-email" placeholder="Enter your registered email" required>
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>

                <div id="message-container" style="margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px;"></div>

                <div class="form-footer">
                    <a href="log-in.html">Back to Login</a>
                    <a href="signup.html">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.querySelector('.login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop the form from doing a traditional page reload

            const email = document.getElementById('reset-email').value;
            const submitButton = document.querySelector('.login-btn');
            const messageBox = document.getElementById('message-container');

            // Reset UI states on clean submission loops
            messageBox.innerText = "";
            submitButton.disabled = true;
            submitButton.textContent = "Sending...";

            const payload = {
                email: email
            };

            try {
                // FIXED: Directing endpoint targets port 3000 to match PHP built-in engine
                const response = await fetch('http://localhost:3000/forgot-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Fallback check if the server replies with a systemic crash state error code (like 404, 405 or 500)
                if (!response.ok) {
                    throw new Error(`Server responded with status code: ${response.status}`);
                }

                // Get raw text first to verify it's actually valid JSON before parsing
                const rawText = await response.text();
                let result;
                
                try {
                    result = JSON.parse(rawText);
                } catch (jsonErr) {
                    // This catches PHP syntax errors/HTML crashes sent back by the server
                    console.error("Server raw response was not JSON:", rawText);
                    throw new Error("Server sent back HTML instead of JSON data. Check console log for details.");
                }

                if (result.success) {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Processing completed! Redirecting to login portal...";
                    alert("A reset link has been processed successfully!");
                    setTimeout(() => {
                        window.location.href = 'log-in.html';
                    }, 2000);
                } else {
                    messageBox.style.color = "red";
                    messageBox.innerText = "Error: " + (result.error || "Failed execution query workflow context.");
                }
            } catch (err) {
                console.error("System connection trace details:", err);
                messageBox.style.color = "red";
                messageBox.innerText = err.message || "Connection error. Please ensure your development server is active.";
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "Send Reset Link";
            }
        });
    </script>

</body>
</html>
