<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-ClanShop - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container-wrapper">
            <img src="resources/images/logo.png" class="uclan-logo" alt="uclan logo" style="width: 150px;" height="50px">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            
            <span id="nav-auth-links">
                <a href="log-in.html">Log In</a>
            </span>
        </nav>
    </header>

    <section class="hero-section" style="position: relative; width: 100%; height: 60vh; min-height: 400px; overflow: hidden; display: flex; justify-content: center; align-items: center; text-align: center;">
        <video 
            autoplay 
            muted 
            loop 
            playsinline
            style="position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); z-index: 1; pointer-events: none;">
            <source src="resources/video/Ignite_Your_Potential_at_the_University_of_Lancashire_–_Autumn_Open_Days_2025(2160p).mp4" type="video/mp4">
        </video>
        
        <div class="hero-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2;"></div>
        
        <div class="hero-content" style="position: relative; z-index: 3; color: #ffffff; padding: 0 20px;">
            <h1 style="font-size: 3.5rem; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 8px rgba(0,0,0,0.6);">Welcome to U-ClanShop</h1>
            <p style="font-size: 1.5rem; margin-bottom: 25px; text-shadow: 1px 1px 4px rgba(0,0,0,0.6);">Gear up with official campus merchandise</p>
            <a href="products.html" style="display: inline-block; padding: 12px 30px; background-color: #0c394c; color: #ffffff; text-decoration: none; font-weight: bold; border-radius: 5px; transition: background 0.3s ease;">Shop Collection</a>
        </div>
    </section>

    <div class="page-container" style="flex-direction: column; align-items: center; padding-top: 40px; padding-bottom: 20px;">
        <h2 style="color: #000000; font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; text-align: center; width: 100%;">Just For You</h2>
        
        <main class="products" id="featured-products-container" style="padding-top: 10px; width: 100%;">
        </main>
    </div>

    <script>
        // Data array mapped to include unique target Database IDs as index 6
        const tshirts = [
            ['Legacy T-Shirt','Red','£7.99','good-stock','images/tshirts/tshirt1.jpg','Perfect for those graduating this year. Get a bargain whilst we have the stock.', 1],
            ['Legacy T-Shirt','Cyan','£7.99','good-stock','images/tshirts/tshirt4.jpg','Perfect for those graduating this year. Get a bargain whilst we have the stock.', 4],
            ['Legacy T-Shirt','Grey','£7.99','good-stock','images/tshirts/tshirt8.jpg','Perfect for those graduating this year. Get a bargain whilst we have the stock.', 8]
        ];

        const featuredContainer = document.getElementById('featured-products-container');

        // Loop through array elements to cleanly unpack and build item components
        tshirts.forEach((tshirt) => {
            const name = tshirt[0];
            const color = tshirt[1];
            const priceString = tshirt[2];
            const imageSrc = tshirt[4];
            const id = tshirt[6];

            // Extract numeric value from string (e.g. "£7.99" -> 7.99)
            const numericPrice = parseFloat(priceString.replace('£', ''));
            const fullTitle = `${color} ${name}`;

            // Render loop layout templates with integrated event context triggers
            const productCard = `
                <div class="product-card">
                    <img src="resources/${imageSrc}" alt="${fullTitle}">
                    <h3>${fullTitle}</h3>
                    <p>${priceString}</p>
                    <button onclick="addToCart(${id}, '${fullTitle}', ${numericPrice})">Add to Cart</button>
                </div>
            `;

            featuredContainer.innerHTML += productCard;
        });

        // Unified Add to Cart script matching system storage configurations
        window.addToCart = function(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('uclan_cart')) || [];
            const existingItem = cart.find(item => item.id === id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: id,
                    name: name,
                    price: price,
                    quantity: 1
                });
            }
            
            localStorage.setItem('uclan_cart', JSON.stringify(cart));
            alert(`👕 ${name} added to your cart successfully!`);
        };

        // UPDATED: Dynamic navigation controller link layout updates
        document.addEventListener("DOMContentLoaded", () => {
            const authLinksContainer = document.getElementById('nav-auth-links');
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');

            if (isLoggedIn === 'true' && authLinksContainer) {
                // Displays ONLY the profile tracking link element inside the header menu
                authLinksContainer.innerHTML = `
                    <a href="profile.html" style="font-weight: bold; color: #ffffff;">My Profile</a>
                `;
            }
        });
    </script>
</body>
</html>
