<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-ClanShop - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container-wrapper">
            <img src="resources/images/logo.png" class="uclan-logo" alt="uclan logo" style="width: 150px;" height="50px">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            
            <span id="nav-auth-links">
                <a href="log-in.html">Log In</a>
            </span>
        </nav>
    </header>

    <div class="page-container">
        <main class="cart-section" aria-labelledby="cart-heading">
            
            <div class="cart-header">
                <h2 id="cart-heading">Shopping Cart</h2>
                <p>Review your items and apply any discount codes before checkout.</p>
            </div>

            <div class="cart-inner">

                <div class="cart-items-container">
                    <h2 style="font-size: 1.5rem; margin-bottom: 15px;">Your Items</h2>
                    <div id="cart-items-list" aria-live="polite"></div>
                </div>

                <aside class="order-summary" aria-labelledby="summary-heading">
                    <h2 id="summary-heading">Order Summary</h2><br>

                    <div class="summary-row">
                        <span>Subtotal (original)</span>
                        <span id="original-total">£0.00</span>
                    </div>
                    <div class="summary-row savings">
                        <span>Your savings</span>
                        <span id="savings-amount">-£0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>After discount</span>
                        <span id="subtotal">£0.00</span>
                    </div>
                    <div class="summary-row" id="code-discount-row" style="display:none; color:var(--grass);">
                        <span id="code-discount-label">Offer code</span>
                        <span id="code-discount-amount">-£0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="grand-total">£0.00</span>
                    </div>

                    <div class="discount-section" aria-label="Apply offer code">
                        <label for="discount-input">Offer Code</label>
                        <div class="discount-input-wrap">
                            <input type="text" class="discount-input" id="discount-input" placeholder="e.g. BOGOF or SAVE20" aria-describedby="discount-msg" autocomplete="off" />
                            <button class="btn-apply" id="apply-btn">Apply</button>
                        </div>
                        <p class="discount-msg" id="discount-msg" aria-live="polite"></p>
                    </div>

                    <div id="checkout-form-container" style="display: none; margin: 15px 0; padding: 15px; border-top: 1px dashed #ccc;">
                        <input type="text" id="buyer-name" placeholder="Your Full Name" required style="width:100%; padding:8px; margin-bottom:8px; box-sizing:border-box;"><br>
                        <input type="email" id="buyer-email" placeholder="Your Email Address" required style="width:100%; padding:8px; margin-bottom:8px; box-sizing:border-box;">
                    </div>

                    <button class="btn-checkout" id="checkout-btn">Proceed to Checkout</button>
                    <button class="btn-empty-cart" id="empty-cart-btn">Empty Cart</button>
                </aside>

            </div>
        </main>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('uclan_cart')) || [];
        let appliedDiscountRate = 0.0; // tracks code modifiers (e.g., 0.25 for GRAD25)

        const itemsList = document.getElementById('cart-items-list');
        const origTotalEl = document.getElementById('original-total');
        const savingsEl = document.getElementById('savings-amount');
        const subtotalEl = document.getElementById('subtotal');
        const grandTotalEl = document.getElementById('grand-total');
        const discountInput = document.getElementById('discount-input');
        const applyBtn = document.getElementById('apply-btn');
        const discountMsg = document.getElementById('discount-msg');
        const checkoutBtn = document.getElementById('checkout-btn');
        const emptyCartBtn = document.getElementById('empty-cart-btn');
        const checkoutFormContainer = document.getElementById('checkout-form-container');

        // Render Cart items and compile running aggregate metrics
        function renderCart() {
            if (cart.length === 0) {
                itemsList.innerHTML = `<p style="padding: 20px 0;">Your cart is empty. View <a href="products.html" style="color:red; text-decoration:underline;">our products</a> to pick items.</p>`;
                origTotalEl.innerText = "£0.00";
                savingsEl.innerText = "-£0.00";
                subtotalEl.innerText = "£0.00";
                grandTotalEl.innerText = "£0.00";
                checkoutBtn.disabled = true;
                emptyCartBtn.disabled = true;
                checkoutFormContainer.style.display = 'none';
                return;
            }

            checkoutBtn.disabled = false;
            emptyCartBtn.disabled = false;

            let html = '<div class="cart-items-grid">';
            let originalTotal = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                originalTotal += itemTotal;

                html += `
                    <div class="cart-item-row" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee;">
                        <div>
                            <h3 style="margin:0; font-size:1.1rem;">${item.name}</h3>
                            <small style="color:#666;">£${item.price.toFixed(2)} each</small>
                        </div>
                        <div style="display:flex; align-items:center; gap:20px;">
                            <span>Qty: <strong>${item.quantity}</strong></span>
                            <span style="font-weight:bold; min-width:70px; text-align:right;">£${itemTotal.toFixed(2)}</span>
                            <button onclick="removeCartItem(${index})" style="background:#dc3545; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Remove</button>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            itemsList.innerHTML = html;

            // Compute summary lines
            const savingsValue = 0.00; // room to extend for implicit catalog discounts
            const subtotalValue = originalTotal - savingsValue;
            const codeDiscountValue = subtotalValue * appliedDiscountRate;
            const finalGrandTotal = subtotalValue - codeDiscountValue;

            origTotalEl.innerText = `£${originalTotal.toFixed(2)}`;
            savingsEl.innerText = `-£${savingsValue.toFixed(2)}`;
            subtotalEl.innerText = `£${subtotalValue.toFixed(2)}`;

            if (appliedDiscountRate > 0) {
                document.getElementById('code-discount-row').style.display = 'flex';
                document.getElementById('code-discount-amount').innerText = `-£${codeDiscountValue.toFixed(2)}`;
            } else {
                document.getElementById('code-discount-row').style.display = 'none';
            }

            grandTotalEl.innerText = `£${finalGrandTotal.toFixed(2)}`;
        }

        // Remove single item slice from index
        window.removeCartItem = function(index) {
            cart.splice(index, 1);
            localStorage.setItem('uclan_cart', JSON.stringify(cart));
            renderCart();
        };

        // Complete empty storage flush
        emptyCartBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to clear your cart?")) {
                cart = [];
                localStorage.removeItem('uclan_cart');
                renderCart();
            }
        });

        // Apply discount coupon modifiers
        applyBtn.addEventListener('click', () => {
            const code = discountInput.value.trim().toUpperCase();
            if (code === 'GRAD25') {
                appliedDiscountRate = 0.25;
                discountMsg.style.color = "green";
                discountMsg.innerText = "Promo applied! 25% discount injected successfully.";
            } else if (code === "") {
                discountMsg.innerText = "";
            } else {
                appliedDiscountRate = 0.0;
                discountMsg.style.color = "red";
                discountMsg.innerText = "Invalid offer code entry.";
            }
            renderCart();
        });

        // Process step routing configurations
        checkoutBtn.addEventListener('click', async () => {
            // Step 1: If input details aren't revealed yet, reveal them
            if (checkoutFormContainer.style.display === 'none') {
                checkoutFormContainer.style.display = 'block';
                checkoutBtn.innerText = "Confirm & Place Order";
                return;
            }

            // Step 2: Extract details and submit payload to backend router
            const name = document.getElementById('buyer-name').value.trim();
            const email = document.getElementById('buyer-email').value.trim();

            if (!name || !email) {
                alert("Please fill out your name and email parameters to clear validation processing.");
                return;
            }

            const payload = {
                name: name,
                email: email,
                cart: cart
            };

            try {
                const response = await fetch('http://localhost:8080/checkout.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.success) {
                    alert('🎉 Order placed successfully! Order Reference ID: ' + result.order_id);
                    cart = [];
                    localStorage.removeItem('uclan_cart');
                    appliedDiscountRate = 0.0;
                    discountInput.value = "";
                    discountMsg.innerText = "";
                    renderCart();
                } else {
                    alert('Checkout runtime handling failed: ' + result.error);
                }
            } catch (err) {
                alert('Network connection error contacting your PHP backend router.');
            }
        });

        // Bootstrap initialization
        renderCart();

        // Dynamic navigation logic to display ONLY the profile link structure
        document.addEventListener("DOMContentLoaded", () => {
            const authLinksContainer = document.getElementById('nav-auth-links');
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');

            if (isLoggedIn === 'true' && authLinksContainer) {
                // Renders strictly the Profile tracking menu block link inside your main header container layout
                authLinksContainer.innerHTML = `
                    <a href="profile.html" style="font-weight: bold; color: #ffffff;">My Profile</a>
                `;
            }
        });
    </script>
</body>
</html>
